<!doctype html>
<html lang="ar" dir="rtl" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="true">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1e3a5f">
  <meta name="description" content="منصة تعليمية متكاملة للتعلم التفاعلي">
  <title>🎓 منصة تعليمية</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&amp;display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      font-family: 'Cairo', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #ffffff;
      min-height: 100%;
      color: #2d3748;
      line-height: 1.6;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    html {
      -webkit-text-size-adjust: 100%;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }
    
    .header {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 40px 30px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
      margin-bottom: 30px;
      border: 2px solid #667eea;
    }
    
    h1 {
      margin: 0;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-size: clamp(24px, 4vw, 32px);
      font-weight: 800;
      letter-spacing: -0.5px;
      line-height: 1.4;
    }
    
    .card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(15px);
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
      margin-bottom: 25px;
      border: 2px solid #e2e8f0;
      transition: all 0.3s ease;
    }
    
    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 25px 50px rgba(0,0,0,0.15);
    }
    
    #m {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: linear-gradient(135deg, #48bb78, #38a169);
      color: white;
      padding: 15px 30px;
      border-radius: 50px;
      box-shadow: 0 10px 30px rgba(72, 187, 120, 0.3);
      z-index: 1000;
      font-weight: 600;
      display: none;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    #progressOverlay {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(15, 23, 42, 0.28);
      z-index: 12000;
      backdrop-filter: blur(2px);
    }

    #progressOverlay.show {
      display: flex;
    }

    #progressCard {
      background: #ffffff;
      border: 1px solid #dbe3ee;
      border-radius: 14px;
      min-width: 240px;
      max-width: 300px;
      padding: 16px 14px;
      box-shadow: 0 14px 30px rgba(15, 23, 42, 0.18);
      text-align: center;
    }

    #progressTitle {
      color: #0f172a;
      font-weight: 800;
      font-size: 14px;
      margin-bottom: 10px;
    }

    #progressPercent {
      color: #1d4ed8;
      font-weight: 800;
      font-size: 24px;
      margin-bottom: 10px;
    }

    #progressBar {
      width: 100%;
      height: 10px;
      border-radius: 999px;
      background: #e2e8f0;
      overflow: hidden;
    }

    #progressBarFill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #3b82f6, #0ea5e9);
      transition: width .16s ease;
    }
    
    #m:not(:empty) {
      display: block;
      animation: slideDown 0.3s ease;
    }
    
    @keyframes slideDown {
      from { transform: translate(-50%, -54%); opacity: 0; }
      to { transform: translate(-50%, -50%); opacity: 1; }
    }
    
    label {
      display: block;
      margin-bottom: 12px;
      font-weight: 700;
      color: #2d3748;
      font-size: 16px;
      letter-spacing: 0.3px;
    }
    
    select, input[type="password"], input[type="text"] {
      width: 100%;
      padding: 16px 20px;
      border: 2px solid #e2e8f0;
      border-radius: 15px;
      font-size: 16px;
      transition: all 0.3s ease;
      box-sizing: border-box;
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(5px);
      font-family: inherit;
    }
    
    select:focus, input[type="password"]:focus, input[type="text"]:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
      background: rgba(255, 255, 255, 1);
      transform: translateY(-2px);
    }
    
    #b {
      margin-top: 30px;
    }
    
    .section-title {
      font-size: 20px;
      font-weight: 700;
      color: #2d3748;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .section-title::before {
      content: "👧";
      font-size: 24px;
    }
    
    #l {
      max-height: 450px;
      overflow-y: auto;
      margin-bottom: 25px;
      border: 2px solid #e2e8f0;
      border-radius: 15px;
      padding: 15px;
      background: rgba(248, 250, 252, 0.5);
      backdrop-filter: blur(5px);
      -webkit-overflow-scrolling: touch;
    }
    
    #l::-webkit-scrollbar {
      width: 8px;
    }
    
    #l::-webkit-scrollbar-track {
      background: rgba(226, 232, 240, 0.3);
      border-radius: 10px;
    }
    
    #l::-webkit-scrollbar-thumb {
      background: linear-gradient(135deg, #667eea, #764ba2);
      border-radius: 10px;
    }
    
    .student {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 25px;
      margin-bottom: 15px;
      background: rgba(255, 255, 255, 0.9);
      border-radius: 15px;
      cursor: pointer;
      transition: all 0.3s ease;
      border: 2px solid transparent;
      box-shadow: 0 5px 15px rgba(0,0,0,0.08);
      backdrop-filter: blur(10px);
    }
    
    .student:hover {
      background: rgba(255, 255, 255, 1);
      border-color: #667eea;
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 10px 25px rgba(102, 126, 234, 0.2);
    }
    
    .student.selected {
      background: linear-gradient(135deg, rgba(245, 101, 101, 0.1), rgba(229, 62, 62, 0.1));
      border-color: #f56565;
      box-shadow: 0 8px 25px rgba(245, 101, 101, 0.25);
    }
    
    .student.selected:hover {
      background: linear-gradient(135deg, rgba(245, 101, 101, 0.2), rgba(229, 62, 62, 0.2));
      border-color: #e53e3e;
      transform: translateY(-3px) scale(1.02);
    }
    
    .student b {
      color: #2d3748;
      font-size: clamp(16px, 2.5vw, 18px);
      font-weight: 700;
      letter-spacing: 0.3px;
    }
    
    .student.selected b {
      color: #c53030;
    }
    
    .student-info {
      display: flex;
      align-items: center;
      gap: 15px;
    }
    
    .student-avatar {
      width: 45px;
      height: 45px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
      font-size: 18px;
    }
    
    .student.selected .student-avatar {
      background: linear-gradient(135deg, #f56565, #e53e3e);
    }
    
    input[type="checkbox"] {
      width: 24px;
      height: 24px;
      cursor: pointer;
      accent-color: #f56565;
      border-radius: 6px;
    }
    
    button {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      padding: 18px 35px;
      border-radius: 15px;
      font-size: clamp(16px, 2.5vw, 18px);
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-left: 10px;
      margin-bottom: 10px;
      min-height: 60px;
      box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
      font-family: inherit;
      letter-spacing: 0.5px;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
    }
    
    button:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 30px rgba(102, 126, 234, 0.4);
      background: linear-gradient(135deg, #5568d3, #6b46c1);
    }
    
    button:active {
      transform: translateY(-1px);
      background: linear-gradient(135deg, #4a5cb8, #5c3aa1);
    }
    
    button[type="button"] {
      background: linear-gradient(135deg, #48bb78, #38a169);
      box-shadow: 0 8px 20px rgba(72, 187, 120, 0.3);
    }
    
    button[type="button"]:hover {
      background: linear-gradient(135deg, #38a169, #2f855a);
      box-shadow: 0 12px 30px rgba(72, 187, 120, 0.4);
    }
    
    button[type="button"]:active {
      background: linear-gradient(135deg, #2f855a, #276749);
    }
    
    button[type="button"]:nth-of-type(2) {
      background: linear-gradient(135deg, #f56565, #e53e3e);
      box-shadow: 0 8px 20px rgba(245, 101, 101, 0.3);
    }
    
    button[type="button"]:nth-of-type(2):hover {
      background: linear-gradient(135deg, #e53e3e, #c53030);
      box-shadow: 0 12px 30px rgba(245, 101, 101, 0.4);
    }
    
    button[type="button"]:nth-of-type(2):active {
      background: linear-gradient(135deg, #c53030, #9b2c2c);
    }
    
    hr {
      border: none;
      height: 3px;
      background: linear-gradient(90deg, transparent, #667eea, transparent);
      margin: 40px 0;
      border-radius: 2px;
    }
    
    #g, #q {
      text-align: center;
    }
    
    #g input {
      max-width: 350px;
      margin: 0 auto 20px;
      display: block;
    }
    
    #am {
      margin-top: 15px;
      font-size: 28px;
      min-height: 35px;
    }
    
    #r {
      background: rgba(247, 250, 252, 0.8);
      backdrop-filter: blur(10px);
      padding: 25px;
      border-radius: 15px;
      margin-top: 25px;
      text-align: right;
      line-height: 1.8;
      min-height: 120px;
      border: 1px solid rgba(226, 232, 240, 0.5);
    }
    
    #r a {
      color: #667eea;
      text-decoration: none;
      font-weight: 600;
      margin: 0 8px;
      padding: 8px 15px;
      background: rgba(237, 242, 247, 0.8);
      border-radius: 25px;
      display: inline-block;
      transition: all 0.3s ease;
      backdrop-filter: blur(5px);
      border: 1px solid rgba(102, 126, 234, 0.2);
    }
    
    #r a:hover {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
    }
    
    .button-group {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin-top: 20px;
    }
    
    .button-group button {
      margin: 0;
      width: 100%;
    }
    
    .loading-spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 1s ease-in-out infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .fade-in {
      animation: fadeIn 0.5s ease;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .student-card {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    
    @media (max-width: 768px) {
      .container { padding: 15px; }
      .header { padding: 30px 20px; margin-bottom: 20px; }
      .card { padding: 20px; margin-bottom: 20px; }
      .student { padding: 15px 20px; margin-bottom: 12px; }
      .student-info { gap: 12px; }
      .student-avatar { width: 40px; height: 40px; font-size: 16px; }
      .button-group { grid-template-columns: 1fr; gap: 12px; }
      button { padding: 16px 25px; min-height: 55px; margin-left: 0; width: 100%; font-size: 16px; }
      #l { max-height: 350px; padding: 12px; }
      select, input[type="password"], input[type="text"] { padding: 14px 18px; font-size: 16px; }
      #g button { width: 100%; margin: 0; padding: 16px 25px; }
    }
  </style>
  <style>
    :root {
      --bg: #f4f7fb;
      --surface: #ffffff;
      --surface-2: #f8fafc;
      --text: #1f2937;
      --muted: #64748b;
      --primary: #3b82f6;
      --primary-soft: #dbeafe;
      --border: #dbe3ee;
      --success: #16a34a;
      --danger: #dc2626;
      --warning: #d97706;
      --shadow: 0 8px 22px rgba(15, 23, 42, 0.08);
    }

    body {
      background: radial-gradient(circle at top, #f8fbff 0%, var(--bg) 55%) !important;
      color: var(--text) !important;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    .header,
    .card {
      background: var(--surface) !important;
      border: 1px solid var(--border) !important;
      box-shadow: var(--shadow) !important;
      border-radius: 16px !important;
    }

    .card:hover,
    .student:hover,
    button:hover {
      transform: none !important;
    }

    h1 {
      background: none !important;
      -webkit-text-fill-color: initial !important;
      color: #0f2f4f !important;
      letter-spacing: 0 !important;
    }

    label {
      color: #334155 !important;
      font-weight: 700 !important;
    }

    select,
    input[type="password"],
    input[type="text"],
    input[type="number"] {
      background: var(--surface-2) !important;
      border: 1px solid var(--border) !important;
      color: var(--text) !important;
      border-radius: 12px !important;
      box-shadow: none !important;
    }

    select:focus,
    input[type="password"]:focus,
    input[type="text"]:focus,
    input[type="number"]:focus {
      border-color: #93c5fd !important;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15) !important;
    }

    #m {
      background: #0f766e !important;
      box-shadow: 0 8px 20px rgba(15, 118, 110, 0.22) !important;
      border: 0 !important;
    }

    #l {
      background: #f8fafc !important;
      border: 1px solid var(--border) !important;
    }

    .student {
      background: #ffffff !important;
      border: 1px solid #e2e8f0 !important;
      box-shadow: 0 3px 10px rgba(15, 23, 42, 0.06) !important;
    }

    .student.selected {
      background: #fff7ed !important;
      border-color: #fdba74 !important;
      box-shadow: 0 3px 10px rgba(217, 119, 6, 0.14) !important;
    }

    .student-avatar {
      background: #475569 !important;
      overflow: hidden !important;
      position: relative !important;
    }

    .student.selected .student-avatar {
      background: #b45309 !important;
    }

    .student-avatar.has-photo {
      background: #ffffff !important;
      border: 1px solid #cbd5e1 !important;
    }

    .student-avatar.has-photo img {
      width: 100% !important;
      height: 100% !important;
      object-fit: cover !important;
      display: block !important;
    }

    .student-side-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .student-photo-input {
      display: none !important;
    }

    #l .student .student-photo-btn {
      min-height: auto !important;
      margin: 0 !important;
      padding: 7px 11px !important;
      border-radius: 999px !important;
      font-size: 12px !important;
      line-height: 1.2 !important;
      background: #e2e8f0 !important;
      color: #0f172a !important;
      box-shadow: none !important;
      border: 1px solid #cbd5e1 !important;
    }

    #l .student .student-photo-btn.student-photo-remove {
      background: #fee2e2 !important;
      color: #b91c1c !important;
      border-color: #fecaca !important;
    }

    button {
      background: #3b82f6 !important;
      color: #fff !important;
      border-radius: 12px !important;
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.2) !important;
      min-height: 52px !important;
    }

    .button-group button:nth-child(1) { background: #16a34a !important; }
    .button-group button:nth-child(2) { background: #dc2626 !important; }
    .button-group button:nth-child(3) { background: #ea580c !important; }
    .button-group button:nth-child(4) { background: #475569 !important; }

    #g button,
    #q button {
      border-radius: 12px !important;
      box-shadow: 0 4px 12px rgba(15, 23, 42, 0.14) !important;
    }

    hr {
      height: 1px !important;
      background: #dbe3ee !important;
      margin: 28px 0 !important;
    }

    #r {
      background: #f8fafc !important;
      border: 1px solid var(--border) !important;
      border-radius: 12px !important;
      color: var(--text) !important;
    }

    #r h2, #r h3 {
      color: #1e293b !important;
    }

    #r [style*="background:linear-gradient"],
    #r [style*="background:#"],
    #r [style*="background:rgba"] {
      background: #ffffff !important;
      box-shadow: 0 2px 8px rgba(15, 23, 42, 0.06) !important;
    }

    #r a {
      background: #e2e8f0 !important;
      color: #0f172a !important;
      border: 0 !important;
      border-radius: 999px !important;
      box-shadow: none !important;
    }

    #r a[href*="wa.me"] {
      background: #dcfce7 !important;
      color: #166534 !important;
    }

    #r a[href^="tel:"] {
      background: #dbeafe !important;
      color: #1d4ed8 !important;
    }

    #r .student-filter-btn {
      min-height: auto !important;
      padding: 6px 12px !important;
      margin: 0 !important;
      border-radius: 999px !important;
      font-size: 12px !important;
      box-shadow: none !important;
    }

    #l {
      -webkit-overflow-scrolling: touch;
      contain: layout paint;
    }

    .card,
    #r,
    .student,
    .student-contact-card {
      contain: layout paint style;
    }

    #r {
      -webkit-overflow-scrolling: touch;
    }

    @media (hover: none), (pointer: coarse) {
      .card,
      .student,
      button,
      #m,
      select,
      input {
        transition: none !important;
      }
      .card:hover,
      .student:hover,
      button:hover {
        transform: none !important;
        box-shadow: inherit !important;
      }
    }

    /* وضع أداء أعلى للهواتف */
    .mobile-fast .header,
    .mobile-fast .card,
    .mobile-fast .student,
    .mobile-fast .student-contact-card,
    .mobile-fast #r,
    .mobile-fast #m {
      box-shadow: 0 1px 6px rgba(15, 23, 42, 0.06) !important;
    }

    .mobile-fast .header,
    .mobile-fast .card,
    .mobile-fast #l,
    .mobile-fast .student,
    .mobile-fast select,
    .mobile-fast input[type="password"],
    .mobile-fast input[type="text"],
    .mobile-fast input[type="date"],
    .mobile-fast input[type="number"] {
      -webkit-backdrop-filter: none !important;
      backdrop-filter: none !important;
    }

    .mobile-fast * {
      animation-duration: 0.001ms !important;
      transition-duration: 0.001ms !important;
    }

    .mobile-fast button,
    .mobile-fast a {
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    /* iPhone Safari performance fallback: تقليل المؤثرات الثقيلة */
    @supports (-webkit-touch-callout: none) {
      .header,
      .card,
      #m,
      #l,
      .student,
      select,
      input[type="password"],
      input[type="text"],
      input[type="date"],
      input[type="number"] {
        -webkit-backdrop-filter: none !important;
        backdrop-filter: none !important;
      }
      .header,
      .card,
      .student,
      #r {
        box-shadow: 0 2px 8px rgba(15, 23, 42, 0.06) !important;
      }
      #m {
        position: fixed !important;
        top: 50% !important;
        left: 50% !important;
        transform: translate(-50%, -50%) !important;
      }
    }

    @media print {
      body {
        background: #ffffff !important;
      }
      .header,
      #g,
      #f,
      #m,
      #q > div:first-child {
        display: none !important;
      }
      #q,
      #r,
      .card {
        display: block !important;
        box-shadow: none !important;
        border: 0 !important;
        margin: 0 !important;
        padding: 0 !important;
      }
      #r {
        background: #ffffff !important;
      }
      #r a {
        color: #000 !important;
        text-decoration: underline !important;
        background: transparent !important;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation: none !important;
        transition: none !important;
      }
    }
  </style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body>

    const API="https://script.google.com/macros/s/AKfycbwwa29lURxWRSlcI9HqpSt_TsxXC2wOvQIGSIXJnTb322W7TiSt2VnjiwSj0Pa1i-YP/exec";

    const STORAGE_KEYS={
      attendance:'attendance_fast_cache_v1',
      students:'students_fast_cache_v1',
      managerUnlocks:'manager_unlock_classes_v1'
    };
    const PHOTO_MAX_BYTES=20*1024*1024; // 20MB
    const STUDENT_PHOTO_DB='student_photo_store_v1';
    const STUDENT_PHOTO_STORE='photos';

      attendance:{ts:0,data:null},
      students:{ts:0,data:null}

      m.textContent=t;

    };

    function readLocalCache(key,maxAgeMs){
      try{
        const raw=localStorage.getItem(key);
        if(!raw) return null;
        const parsed=JSON.parse(raw);
        if(!parsed || !parsed.ts) return null;
        if((Date.now()-parsed.ts)>maxAgeMs) return null;
        return parsed.data;
      }catch(_){
        return null;
      }
    }

    function writeLocalCache(key,data){
      try{
        localStorage.setItem(key,JSON.stringify({ts:Date.now(),data}));
      }catch(_){}
    }

    function removeLocalCache(key){
      try{ localStorage.removeItem(key); }catch(_){}
    }

    function getManagerUnlockSet(){
      const todayKey=getLocalDateISO();
      try{
        const raw=localStorage.getItem(STORAGE_KEYS.managerUnlocks);
        if(!raw) return new Set();
        const parsed=JSON.parse(raw);
        if(!parsed || parsed.date!==todayKey || !Array.isArray(parsed.classes)) return new Set();
        return new Set(parsed.classes.map(v=>String(v||'').trim()).filter(Boolean));
      }catch(_){
        return new Set();
      }
    }

    function saveManagerUnlockSet(setObj){
      try{
        const classes=[...setObj].map(v=>String(v||'').trim()).filter(Boolean);
        localStorage.setItem(STORAGE_KEYS.managerUnlocks,JSON.stringify({
          date:getLocalDateISO(),
          classes
        }));
      }catch(_){}
    }

    function enableMobilePerformanceMode(){
      const ua=navigator.userAgent||'';
      const isMobile=/Android|iPhone|iPad|iPod|Mobile/i.test(ua);
      const isIOS=/iPhone|iPad|iPod/i.test(ua);
      if(!isMobile) return;
      document.body.classList.add('mobile-fast');
      document.documentElement.style.scrollBehavior='auto';
      if(isIOS){
        document.documentElement.style.height='-webkit-fill-available';
        document.body.style.minHeight='-webkit-fill-available';
      }
    }

    const setProgress=(percent,label='جاري التنفيذ')=>{
      const overlay=$('progressOverlay');
      if(!overlay) return;
      const p=Math.max(0,Math.min(100,Math.round(percent)));
      $('progressTitle').textContent=label;
      $('progressPercent').textContent=`${p}%`;
      $('progressBarFill').style.width=`${p}%`;
      overlay.classList.add('show');
    };

    const hideProgress=()=>{
      const overlay=$('progressOverlay');
      if(!overlay) return;
      overlay.classList.remove('show');
      $('progressBarFill').style.width='0%';
      $('progressPercent').textContent='0%';
      $('progressTitle').textContent='جاري التنفيذ';
    };

    let studentPhotoDbPromise=null;
    function studentPhotoKey(className,studentName){
      return `${String(className||'').trim()}__${String(studentName||'').trim()}`;
    }

    function openStudentPhotoDb(){
      if(studentPhotoDbPromise) return studentPhotoDbPromise;
      studentPhotoDbPromise=new Promise((resolve,reject)=>{
        if(!window.indexedDB){
          reject(new Error('IndexedDB not supported'));
          return;
        }
        const req=indexedDB.open(STUDENT_PHOTO_DB,1);
        req.onupgradeneeded=e=>{
          const db=e.target.result;
          if(!db.objectStoreNames.contains(STUDENT_PHOTO_STORE)){
            db.createObjectStore(STUDENT_PHOTO_STORE,{keyPath:'key'});
          }
        };
        req.onsuccess=()=>resolve(req.result);
        req.onerror=()=>reject(req.error||new Error('open db failed'));
      });
      return studentPhotoDbPromise;
    }

    async function getStudentPhotoRecord(className,studentName){
      try{
        const db=await openStudentPhotoDb();
        const key=studentPhotoKey(className,studentName);
        return await new Promise((resolve,reject)=>{
          const tx=db.transaction(STUDENT_PHOTO_STORE,'readonly');
          const store=tx.objectStore(STUDENT_PHOTO_STORE);
          const req=store.get(key);
          req.onsuccess=()=>resolve(req.result||null);
          req.onerror=()=>reject(req.error||new Error('read failed'));
        });
      }catch(_){
        return null;
      }
    }

    async function setStudentPhotoRecord(className,studentName,photoDataUrl,fileMeta){
      const db=await openStudentPhotoDb();
      const key=studentPhotoKey(className,studentName);
      return await new Promise((resolve,reject)=>{
        const tx=db.transaction(STUDENT_PHOTO_STORE,'readwrite');
        const store=tx.objectStore(STUDENT_PHOTO_STORE);
        const req=store.put({
          key,
          className:String(className||'').trim(),
          studentName:String(studentName||'').trim(),
          photoDataUrl,
          updatedAt:Date.now(),
          fileName:fileMeta&&fileMeta.name?String(fileMeta.name):'',
          fileType:fileMeta&&fileMeta.type?String(fileMeta.type):'',
          fileSize:fileMeta&&fileMeta.size?Number(fileMeta.size):0
        });
        req.onsuccess=()=>resolve(true);
        req.onerror=()=>reject(req.error||new Error('save failed'));
      });
    }

    async function deleteStudentPhotoRecord(className,studentName){
      try{
        const db=await openStudentPhotoDb();
        const key=studentPhotoKey(className,studentName);
        await new Promise((resolve,reject)=>{
          const tx=db.transaction(STUDENT_PHOTO_STORE,'readwrite');
          const store=tx.objectStore(STUDENT_PHOTO_STORE);
          const req=store.delete(key);
          req.onsuccess=()=>resolve(true);
          req.onerror=()=>reject(req.error||new Error('delete failed'));
        });
      }catch(_){}
    }

    function fileToDataUrl(file){
      return new Promise((resolve,reject)=>{
        const fr=new FileReader();
        fr.onload=()=>resolve(String(fr.result||''));
        fr.onerror=()=>reject(fr.error||new Error('file read failed'));
        fr.readAsDataURL(file);
      });
    }
    
    onload=async()=>{
      enableMobilePerformanceMode();
      await cls();
      setDefaultDateRange();
    };

    function setDefaultDateRange(){
      const today=getTodayISO();
      if($('dateFrom')) $('dateFrom').value=today;
      if($('dateTo')) $('dateTo').value=today;
    }

    function getLocalDateISO(value){
      const d=value?new Date(value):new Date();
      if(Number.isNaN(d.getTime())) return '';
      const y=d.getFullYear();
      const m=String(d.getMonth()+1).padStart(2,'0');
      const day=String(d.getDate()).padStart(2,'0');
      return `${y}-${m}-${day}`;
    }

    function getLockedClassesToday(attendanceRows){
      const todayKey=getLocalDateISO();
      const lockedClasses=new Set();
      (attendanceRows||[]).forEach(row=>{
        if(!row || !String(row.student||'').startsWith('الصف ')) return;
        const rowDay=getLocalDateISO(row.time);
        if(!rowDay || rowDay!==todayKey) return;
        const cls=String(row.class||'').trim()||String(row.student||'').replace('الصف ','').trim();
        if(cls) lockedClasses.add(cls);
      });
      return lockedClasses;
    }

    function showManagerUnlockDialog(lockedList){
      return new Promise(resolve=>{
        const selectedClasses=new Set();
        const overlay=document.createElement('div');
        overlay.style.cssText='position:fixed;inset:0;background:rgba(15,23,42,.45);z-index:14000;display:flex;align-items:center;justify-content:center;padding:14px;';

        const card=document.createElement('div');
        card.style.cssText='width:min(520px,100%);max-height:85vh;overflow:auto;background:#fff;border:1px solid #dbe3ee;border-radius:14px;padding:14px;box-shadow:0 16px 40px rgba(15,23,42,.25);';

        const title=document.createElement('div');
        title.textContent='إعادة فتح الصف (صلاحية المدير)';
        title.style.cssText='font-size:16px;font-weight:800;color:#0f172a;margin-bottom:8px;';

        const hint=document.createElement('div');
        hint.textContent='اختر صفًا أو أكثر لإعادة فتحها:';
        hint.style.cssText='font-size:13px;color:#475569;margin-bottom:10px;';

        const grid=document.createElement('div');
        grid.style.cssText='display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;';
        lockedList.forEach(cls=>{
          const b=document.createElement('button');
          b.type='button';
          b.textContent=cls;
          b.dataset.label=cls;
          b.dataset.selected='false';
          b.style.cssText='min-height:42px;border:2px solid #c7d2fe !important;background:#eef2ff !important;color:#1e3a8a !important;border-radius:10px;font-weight:800;cursor:pointer;padding:8px;';
          b.onclick=()=>{
            if(selectedClasses.has(cls)){
              selectedClasses.delete(cls);
              b.dataset.selected='false';
              b.textContent=b.dataset.label;
              b.style.setProperty('background','#eef2ff','important');
              b.style.setProperty('border-color','#c7d2fe','important');
              b.style.setProperty('color','#1e3a8a','important');
              b.style.setProperty('box-shadow','none','important');
            }else{
              selectedClasses.add(cls);
              b.dataset.selected='true';
              b.textContent='✓ '+b.dataset.label;
              b.style.setProperty('background','#1d4ed8','important');
              b.style.setProperty('border-color','#1d4ed8','important');
              b.style.setProperty('color','#ffffff','important');
              b.style.setProperty('box-shadow','0 0 0 3px rgba(59,130,246,.25)','important');
            }
            const hasSelection=selectedClasses.size>0;
            confirm.disabled=!hasSelection;
            confirm.style.opacity=hasSelection?'1':'.5';
          };
          grid.appendChild(b);
        });

        const actions=document.createElement('div');
        actions.style.cssText='display:flex;justify-content:flex-end;gap:8px;margin-top:12px;';
        const confirm=document.createElement('button');
        confirm.type='button';
        confirm.textContent='تأكيد';
        confirm.disabled=true;
        confirm.style.cssText='min-height:40px;border:1px solid #2563eb;background:#2563eb;color:#fff;border-radius:10px;font-weight:700;cursor:pointer;padding:8px 14px;opacity:.5;';
        confirm.onclick=()=>{
          if(!selectedClasses.size) return;
          cleanup();
          resolve([...selectedClasses]);
        };
        const cancel=document.createElement('button');
        cancel.type='button';
        cancel.textContent='إلغاء';
        cancel.style.cssText='min-height:40px;border:1px solid #dbe3ee;background:#f8fafc;color:#334155;border-radius:10px;font-weight:700;cursor:pointer;padding:8px 14px;';
        cancel.onclick=()=>{
          cleanup();
          resolve([]);
        };
        actions.appendChild(confirm);
        actions.appendChild(cancel);

        card.appendChild(title);
        card.appendChild(hint);
        card.appendChild(grid);
        card.appendChild(actions);
        overlay.appendChild(card);
        overlay.onclick=e=>{
          if(e.target===overlay){
            cleanup();
            resolve([]);
          }
        };
        document.body.appendChild(overlay);

        function cleanup(){
          if(overlay&&overlay.parentNode) overlay.parentNode.removeChild(overlay);
        }
      });
    }

    async function managerReopenClass(){
      if(managerReopenBusy) return;
      managerReopenBusy=true;
      const reopenBtn=document.querySelector('button[onclick="managerReopenClass()"]');
      if(reopenBtn){
        reopenBtn.dataset.originalText=reopenBtn.textContent;
        reopenBtn.textContent='⏳ جاري التحميل...';
        reopenBtn.disabled=true;
        reopenBtn.style.opacity='.8';
      }
      msg('جاري تحميل الصفوف المغلقة...');
      setProgress(8,'جاري تحميل الصفوف المغلقة');
      try{
        const [studentsData,attendance]=await Promise.all([
          getStudentsData(),
          getAttendanceData(true)
        ]);
        setProgress(45,'جاري تجهيز قائمة الصفوف');
        const allClasses=[...new Set(
          (studentsData||[])
            .filter(x=>x.class)
            .map(x=>String(x.class).trim())
            .filter(Boolean)
        )].sort(compareClasses);
        const lockedToday=getLockedClassesToday(attendance);
        const lockedList=allClasses.filter(cls=>lockedToday.has(cls));
        hideProgress();
        if(!lockedList.length){
          msg('لا توجد صفوف مغلقة اليوم');
          return;
        }
        const selectedList=await showManagerUnlockDialog(lockedList);
        if(!Array.isArray(selectedList) || !selectedList.length) return;
        const unlockSet=getManagerUnlockSet();
        selectedList.forEach(cls=>unlockSet.add(String(cls||'').trim()));
        saveManagerUnlockSet(unlockSet);
        await cls(true);
        const firstSelected=String(selectedList[0]||'').trim();
        c.value=firstSelected;
        if(c.value===firstSelected) c.onchange();
        msg(`تمت إعادة فتح ${selectedList.length} صف`);
      }catch(_){
        hideProgress();
        msg('تعذر إعادة فتح الصف');
      }finally{
        managerReopenBusy=false;
        if(reopenBtn){
          reopenBtn.disabled=false;
          reopenBtn.textContent=reopenBtn.dataset.originalText||'🔓 إعادة فتح صف';
          reopenBtn.style.opacity='1';
        }
      }
    }

    function getSelectedDateRange(){
      const today=getTodayISO();
      const from=($('dateFrom')&&$('dateFrom').value)?$('dateFrom').value:today;
      const to=($('dateTo')&&$('dateTo').value)?$('dateTo').value:today;
      if(from<=to) return {from,to};
      return {from:to,to:from};
    }

      if(action==='both') return 'واتساب + اتصال';
      if(action==='whatsapp') return 'واتساب';
      if(action==='call') return 'اتصال';
      return 'لم يتم';

    async function cls(forceRefresh=false){
      try{
        const prevValue=String(c.value||'').trim();
        const [studentsData,attendance]=await Promise.all([
          getStudentsData(),
          getAttendanceData(forceRefresh)
        ]);
        S=studentsData;
        const allClasses=[...new Set(
          studentsData
            .filter(x=>x.class)
            .map(x=>String(x.class).trim())
            .filter(Boolean)
        )].sort(compareClasses);

        const lockedClasses=getLockedClassesToday(attendance);
        const managerUnlocks=getManagerUnlockSet();
        const availableClasses=allClasses.filter(cls=>!lockedClasses.has(cls) || managerUnlocks.has(cls));

        if(!availableClasses.length){
          c.innerHTML='<option value="">تم تسجيل جميع الصفوف اليوم</option>';
          c.value='';
          b.style.display='none';
          l.innerHTML='';
          return;
        }

        c.innerHTML='<option value="">اختر الصف...</option>'+availableClasses.map(x=>'<option>'+x+'</option>').join('');
        if(prevValue && availableClasses.includes(prevValue)){
          c.value=prevValue;
        }
      }catch(e){
        c.innerHTML='<option>فشل التحميل</option>'
        c.value='';
        b.style.display='none';
        l.innerHTML='';
      }
    }

    f.onsubmit=async e=>{

      const absenceType=$('absenceType').value;
      const teacherName=($('teacherName')&&$('teacherName').value?$('teacherName').value:'').trim();
      if(!teacherName) return msg('ادخل اسم المعلم');
      if(!modePicked){
        window.alert('يرجى اختيار نوع التسجيل قبل الحفظ: حضور كامل أو غياب كامل أو غائب أو متسرب.');
        msg('اختر نوع التسجيل أولًا');
        return;
      }
      const selectedCount=document.querySelectorAll('.student input[type="checkbox"]:checked').length;
      const isDropout=recordMode==='dropout';
      const isFullAttendanceMode=recordMode==='full_attendance';
      const isFullAbsenceMode=recordMode==='full_absence';
      const totalInClass=document.querySelectorAll('.student input[type="checkbox"]').length;
      const isFullClassAbsence=isFullAbsenceMode || (selectedCount>0 && selectedCount===totalInClass);
      const effectiveSelectedCount=isFullAttendanceMode?0:(isFullAbsenceMode?totalInClass:selectedCount);
      const studentStatus=isDropout?`متسربة - ${absenceType}`:`غائبة - ${absenceType}`;
      const summaryStatus=isFullAttendanceMode
        ?'حضور كامل'
        :isDropout
        ?`${effectiveSelectedCount} متسربة (${absenceType})`
        :`${effectiveSelectedCount} غائبة (${absenceType})`;
      const selectedStudents=[...document.querySelectorAll('.student')].filter(d=>{
        const cb=d.querySelector('input[type="checkbox"]');
        return !!(cb&&cb.checked);
      });
      const targetStudents=isFullAttendanceMode
        ? []
        : isFullAbsenceMode
        ? [...document.querySelectorAll('.student')]
        : selectedStudents;
      const a=targetStudents.map(d=>({
        student:d.dataset.s,
        class:c.value,
        status:studentStatus,
        teacher:teacherName
      }));
      const confirmText=
        `تأكيد الحفظ\n\n`+
        `المعلم: ${teacherName}\n`+
        `الصف: ${c.value}\n`+
        `الحالة: ${isFullAttendanceMode?'حضور كامل':isFullAbsenceMode?'غياب كامل':isDropout?'تسرب':absenceType}\n`+
        `عدد الطالبات المحددات: ${effectiveSelectedCount}\n\n`+
        `هل تريد متابعة الحفظ؟`;
      if(!window.confirm(confirmText)){
        msg('تم إلغاء الحفظ');
        return;
      }
      msg('جاري الحفظ...');
      try{
        const selectedClass=c.value;
        const totalOps=2+a.length; // ملخص الصف + سجل المعلم + سجلات الطالبات
        let doneOps=0;
        setProgress(0,'جاري حفظ البيانات');
        const summarySaved=await sv({student:'الصف '+c.value,class:c.value,status:summaryStatus,teacher:teacherName});
        if(!summarySaved) throw new Error('summary save failed');
        doneOps++;
        setProgress(Math.round((doneOps/totalOps)*100),'جاري حفظ البيانات');
        const teacherSaved=await sv({student:'المعلم '+c.value,class:c.value,status:teacherName,teacher:teacherName});
        if(!teacherSaved) throw new Error('teacher save failed');
        doneOps++;
        setProgress(Math.round((doneOps/totalOps)*100),'جاري حفظ البيانات');

        let failedSaves=0;
        if(a.length){
          const chunkSize=isFullClassAbsence?30:16;
          for(let i=0;i<a.length;i+=chunkSize){
            const chunk=a.slice(i,i+chunkSize);
            failedSaves+=await saveChunkWithRetry(chunk);
            doneOps+=chunk.length;
            setProgress(Math.round((doneOps/totalOps)*100),'جاري حفظ البيانات');
          }
        }
        setProgress(100,'اكتمل الحفظ');
        setTimeout(hideProgress,260);

        if(failedSaves===0){

          unlockSet.delete(selectedClass);
          saveManagerUnlockSet(unlockSet);
        }
        fastCache.attendance={ts:0,data:null};
        removeLocalCache(STORAGE_KEYS.attendance);

        b.style.display='none';
        l.innerHTML='';
      }catch(error){
        hideProgress();
        msg('❌ خطأ في الحفظ - حاول مرة أخرى');
      }
    }

    async function saveChunkWithRetry(chunk){
      let failed=0;
      const first=await Promise.allSettled(chunk.map(o=>sv(o)));
      const retryList=[];
      first.forEach((res,idx)=>{
        if(res.status!=='fulfilled' || res.value!==true){
          retryList.push(chunk[idx]);
        }
      });
      if(retryList.length){
        const second=await Promise.allSettled(retryList.map(o=>sv(o)));
        failed+=second.filter(res=>res.status!=='fulfilled' || res.value!==true).length;
      }
      return failed;
    }

    function getTodayContactStoreKey(){

    function getContactAction(studentKey){
      try{
        const actions=JSON.parse(localStorage.getItem(getTodayContactStoreKey())||'{}');
        const entry=actions[studentKey];
        if(!entry) return null;
        if(typeof entry==='string') return entry; // دعم القيم القديمة
        const hasWhatsApp=!!entry.whatsapp;
        const hasCall=!!entry.call;
        if(hasWhatsApp && hasCall) return 'both';
        if(hasWhatsApp) return 'whatsapp';
        if(hasCall) return 'call';
        return null;
      }catch(_){
        return null;
      }
    }

    function markContact(studentKey,action){
      let actions={};
      try{
        actions=JSON.parse(localStorage.getItem(getTodayContactStoreKey())||'{}');
      }catch(_){
        actions={};
      }
      const prev=actions[studentKey];
      const next={
        whatsapp: typeof prev==='object' ? !!prev.whatsapp : prev==='whatsapp',
        call: typeof prev==='object' ? !!prev.call : prev==='call'
      };
      if(action==='whatsapp') next.whatsapp=true;
      if(action==='call') next.call=true;
      actions[studentKey]=next;
      localStorage.setItem(getTodayContactStoreKey(),JSON.stringify(actions));
    }

    function parseClassForSort(className){
      const raw=String(className||'').trim();
      const match=raw.match(/^(.+?)\s*\/?\s*(\d+)$/);
      if(match){
        return {name:match[1].trim(), number:parseInt(match[2],10)};
      }
      return {name:raw, number:0};
    }

    function compareClasses(a,b){
      const normalizeGradeName=(name)=>{
        const n=String(name||'').trim().replace(/\s+/g,' ');
        const aliases={
          'الأول':'اول','الأولى':'اول','اولى':'اول',
          'الثاني':'ثاني','الثانية':'ثاني',
          'الثالث':'ثالث','الثالثة':'ثالث',
          'الرابع':'رابع','الرابعة':'رابع',
          'الخامس':'خامس','الخامسة':'خامس',
          'السادس':'سادس','السادسة':'سادس',
          'السابع':'سابع','السابعة':'سابع',
          'الثامن':'ثامن','الثامنة':'ثامن',
          'التاسع':'تاسع','التاسعة':'تاسع',
          'العاشر':'عاشر','العاشرة':'عاشر',
          'الحادي عشر':'حادي عشر',
          'الحادية عشرة':'حادي عشر',
          'الثاني عشر':'ثاني عشر',
          'الثانية عشرة':'ثاني عشر'
        };
        return aliases[n]||n;
      };
      const gradeOrder={
        'اول':1,'ثاني':2,'ثالث':3,'رابع':4,'خامس':5,'سادس':6,'سابع':7,'ثامن':8,'تاسع':9,'عاشر':10,'حادي عشر':11,'ثاني عشر':12
      };
      const ca=parseClassForSort(a);
      const cb=parseClassForSort(b);
      const na=normalizeGradeName(ca.name);
      const nb=normalizeGradeName(cb.name);
      const ga=gradeOrder[na]||999;
      const gb=gradeOrder[nb]||999;
      if(ga!==gb) return ga-gb;
      if(na!==nb) return na.localeCompare(nb,'ar');
      return ca.number-cb.number;
    }

    async function getAttendanceData(forceRefresh=false){
      const now=Date.now();
      if(!forceRefresh && fastCache.attendance.data && (now-fastCache.attendance.ts)<FAST_CACHE_MS){
        return fastCache.attendance.data;
      }
      if(!forceRefresh){
        const localCached=readLocalCache(STORAGE_KEYS.attendance,ATTENDANCE_CACHE_MS);
        if(localCached){
          fastCache.attendance={ts:now,data:localCached};
          return localCached;
        }
      }
      const data=await (await fetch(API,{cache:'no-store'})).json();
      fastCache.attendance={ts:now,data};
      writeLocalCache(STORAGE_KEYS.attendance,data);
      return data;
    }

    async function getStudentsData(){
      const now=Date.now();
      if(Array.isArray(S) && S.length) return S;
      if(fastCache.students.data && (now-fastCache.students.ts)<STUDENTS_CACHE_MS){
        S=fastCache.students.data;
        return S;
      }
      const localCached=readLocalCache(STORAGE_KEYS.students,STUDENTS_CACHE_MS);
      if(Array.isArray(localCached) && localCached.length){
        fastCache.students={ts:now,data:localCached};
        S=localCached;

      }

      fastCache.students={ts:now,data:S};
      writeLocalCache(STORAGE_KEYS.students,S);
      return S;
    }

      r.innerHTML='<div style="text-align:center;padding:30px;">جاري تحميل البيانات...</div>';
      try{
        const attendancePromise=getAttendanceData(forceRefresh);
        const studentsPromise=getStudentsData();
        const [attendance,studentsData]=await Promise.all([attendancePromise,studentsPromise]);
        setProgress(60,'جاري تجهيز البيانات');
        if(requestId!==absRequestId) return;
        const normalizeClassKey=v=>String(v||'').replace(/\s+/g,' ').trim();
        const getDateKey=t=>{
          const s=String(t||'');
          if(s.length>=10 && s[4]==='-' && s[7]==='-') return s.slice(0,10);
          const d=new Date(t);
          if(Number.isNaN(d.getTime())) return '';
          return d.toISOString().slice(0,10);
        };
        const getTimeMs=row=>{
          if(typeof row.__timeMs==='number') return row.__timeMs;
          const n=new Date(row.time||0).getTime();
          row.__timeMs=Number.isNaN(n)?0:n;
          return row.__timeMs;
        };
        const getTeacherFromRecord=(row={})=>String(
          row.teacher||
          row.teacherName||
          row['اسم المعلم']||
          row['المعلم']||
          ''
        ).trim();
        
        const {from:fromDate,to:toDate}=getSelectedDateRange();
        const todayRows=attendance.filter(v=>{
          if(!v.time) return false;
          const d=getDateKey(v.time);
          return d && d>=fromDate && d<=toDate;
        });
        const classTotals={};
        const studentLookup={};
        studentsData.forEach(s=>{
          const cls=String(s.class||'').trim();
          const stu=String(s.student||'').trim();
          if(!cls) return;
          if(stu) classTotals[cls]=(classTotals[cls]||0)+1;
          if(stu){
            const k=`${cls}__${stu}`;
            if(!studentLookup[k]) studentLookup[k]=s;
          }
        });
        const allClasses=Object.keys(classTotals).sort(compareClasses);

        const classSummaryRows=todayRows
          .filter(v=>String(v.student||'').startsWith('الصف '))
          .sort((a,b)=>getTimeMs(a)-getTimeMs(b));

        const latestTeacherByClassAll={};
        attendance
          .filter(v=>String(v.student||'').startsWith('المعلم ') || !!getTeacherFromRecord(v))
          .sort((a,b)=>getTimeMs(a)-getTimeMs(b))
          .forEach(row=>{
            const clsFromStudent=normalizeClassKey(String(row.student||'').replace('المعلم ',''));
            const cls=normalizeClassKey(String(row.class||''))||clsFromStudent;
            if(!cls) return;
            const nameFromStatus=String(row.status||'').trim();
            const teacherValue=getTeacherFromRecord(row)||nameFromStatus;
            if(!teacherValue) return;
            latestTeacherByClassAll[cls]=teacherValue;
          });

        const teacherRows=todayRows
          .filter(v=>String(v.student||'').startsWith('المعلم '))
          .sort((a,b)=>getTimeMs(a)-getTimeMs(b));

        const studentRowsToday=todayRows
          .filter(v=>!String(v.student||'').startsWith('الصف ') && !String(v.student||'').startsWith('المعلم '));

        const sortedStudentRows=[...studentRowsToday].sort((a,b)=>getTimeMs(a)-getTimeMs(b));
        const latestStudentRowByKey={};
        sortedStudentRows.forEach(row=>{
          const key=`${String(row.class||'').trim()}__${String(row.student||'').trim()}`;
          latestStudentRowByKey[key]=row;
        });
        const latestStudentRows=Object.values(latestStudentRowByKey);

        const classStudentStatuses={};
        latestStudentRows.forEach(row=>{
          const cls=String(row.class||'').trim();
          if(!cls) return;
          if(!classStudentStatuses[cls]) classStudentStatuses[cls]=[];
          classStudentStatuses[cls].push(String(row.status||'').trim());
        });

        const latestSummaryByClass={};
        classSummaryRows.forEach(row=>{
          const cls=normalizeClassKey(String(row.student).replace('الصف ',''));
          latestSummaryByClass[cls]=row;
        });

        const latestTeacherByClass={};
        teacherRows.forEach(row=>{
          const clsFromStudent=normalizeClassKey(String(row.student||'').replace('المعلم ',''));
          const cls=normalizeClassKey(String(row.class||''))||clsFromStudent;
          if(!cls) return;
          const nameFromStatus=String(row.status||'').trim();
          const nameFromTeacher=String(row.teacher||row.teacherName||row['اسم المعلم']||row['المعلم']||'').trim();
          latestTeacherByClass[cls]=nameFromTeacher||nameFromStatus;
        });
        const fallbackTeacherName=($('teacherName')&&$('teacherName').value?$('teacherName').value:'').trim()||'غير محدد';
        const getTeacherForClass=cls=>{
          const normCls=normalizeClassKey(cls);
          const summaryTeacher=getTeacherFromRecord(latestSummaryByClass[normCls]||{});
          if(summaryTeacher) return summaryTeacher;
          const teacherFromDay=String(latestTeacherByClass[normCls]||'').trim();
          if(teacherFromDay) return teacherFromDay;
          const teacherFromAll=String(latestTeacherByClassAll[normCls]||'').trim();
          if(teacherFromAll) return teacherFromAll;
          return fallbackTeacherName;
        };

        let fullAttendance=0;
        let fullAbsence=0;
        let partialAbsence=0;
        let dropoutClasses=0;
        let notRecorded=0;
        const fullAttendanceClasses=[];
        const fullAbsenceClasses=[];
        const partialAbsenceClasses=[];
        const dropoutClassesList=[];
        const notRecordedClasses=[];

        allClasses.forEach(cls=>{
          const summary=latestSummaryByClass[cls];
          const statusesInClass=classStudentStatuses[cls]||[];
          const hasDropoutInStudents=statusesInClass.some(isDropoutStatus);
          const absenceCountInStudents=statusesInClass.filter(s=>String(s).includes('غائبة')).length;
          const total=classTotals[cls]||0;

          if(hasDropoutInStudents){
            dropoutClasses++;
            const summaryText=summary?String(summary.status||'').trim():'تم رصد تسرب من سجل الطالبات';
            dropoutClassesList.push(`${cls} (${summaryText}) | المعلم: ${getTeacherForClass(cls)}`);
            return;
          }

          if(absenceCountInStudents>0){
            const statusText=`${absenceCountInStudents} غائبة (من سجل الطالبات)`;
            if(total>0 && absenceCountInStudents>=total){
              fullAbsence++;
              fullAbsenceClasses.push(`${cls} (${statusText}) | المعلم: ${getTeacherForClass(cls)}`);
            }else{
              partialAbsence++;
              partialAbsenceClasses.push(`${cls} (${statusText}) | المعلم: ${getTeacherForClass(cls)}`);
            }
            return;
          }

          if(!summary){
            notRecorded++;
            notRecordedClasses.push(`${cls} | المعلم: ${getTeacherForClass(cls)}`);
            return;
          }
          const status=String(summary.status||'');
          if(status==='حضور كامل'){
            fullAttendance++;
            fullAttendanceClasses.push(`${cls} (حضور كامل) | المعلم: ${getTeacherForClass(cls)}`);
            return;
          }
          if(isDropoutStatus(status)){
            dropoutClasses++;
            dropoutClassesList.push(`${cls} (${status}) | المعلم: ${getTeacherForClass(cls)}`);
            return;
          }
          const count=parseInt((status.match(/\d+/)||['0'])[0],10);
          if(total>0 && count>=total){
            fullAbsence++;
            fullAbsenceClasses.push(`${cls} (${status}) | المعلم: ${getTeacherForClass(cls)}`);
          }else{
            partialAbsence++;
            partialAbsenceClasses.push(`${cls} (${status}) | المعلم: ${getTeacherForClass(cls)}`);
          }
        });

        const studentAbsences=latestStudentRows
          .filter(v=>String(v.status||'').includes('غائبة')||isDropoutStatus(v.status))
          .sort((a,b)=>getTimeMs(a)-getTimeMs(b));
        const dropoutRows=studentAbsences.filter(v=>isDropoutStatus(v.status));
        const absenceRows=studentAbsences.filter(v=>!isDropoutStatus(v.status));
        const uniqueStudentRows=[...dropoutRows,...absenceRows];
        const getTeacherForRow=(row,cls)=>{
          const normCls=normalizeClassKey(cls);
          const direct=getTeacherFromRecord(row);
          if(direct) return direct;
          const teacherFromClassRow=String(latestTeacherByClass[normCls]||'').trim();
          if(teacherFromClassRow) return teacherFromClassRow;
          const teacherFromAllRows=String(latestTeacherByClassAll[normCls]||'').trim();
          if(teacherFromAllRows) return teacherFromAllRows;
          const summaryTeacher=getTeacherFromRecord(latestSummaryByClass[normCls]||{});
          if(summaryTeacher) return summaryTeacher;
          return fallbackTeacherName;
        };

        const studentCards=uniqueStudentRows.map(o=>{
          const cls=String(o.class||'').trim();
          const name=String(o.student||'').trim();
          const status=String(o.status||'').trim();
          const teacherName=getTeacherForRow(o,cls);
          const isDropout=isDropoutStatus(status);
          const cardBg='#ffffff';
          const cardBorder='#dbe6f3';
          const badgeBg='#f8fafc';
          const badgeColor=isDropout?'#7e22ce':'#c2410c';
          const studentKey=`${cls}__${name}`;
          const actionTaken=getContactAction(studentKey);
          const nameColor=actionTaken==='both'?'#7e22ce':actionTaken==='whatsapp'?'#15803d':actionTaken==='call'?'#1d4ed8':'#0f172a';
          const actionHintText=actionTaken==='both'
            ? '✓ تم التواصل واتساب + اتصال'
            : actionTaken==='whatsapp'
            ? '✓ تم التواصل واتساب'
            : actionTaken==='call'
            ? '✓ تم التواصل اتصال'
            : '';
          const actionHintColor=actionTaken==='both'?'#7e22ce':actionTaken==='whatsapp'?'#15803d':actionTaken==='call'?'#1d4ed8':'#94a3b8';
          const matched=studentLookup[`${cls}__${name}`];
          const phone=normalizePhone(matched?matched.phone:'');
          const hasPhone=phone.length>=8;
          const nowDate=new Date().toLocaleDateString('ar-EG');
          const nowTime=new Date().toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'});
          const periodLabel=(status.split('-')[1]||'الحصة الأولى').trim();
          const waMessage=isDropout
            ? `السلام عليكم ورحمة الله وبركاته\n`+
              `ولي أمر الطالبة/ ${name} المحترم\n`+
              `نود إشعاركم بأن الطالبة من الصف ${cls} متسربة عن ${periodLabel} بتاريخ ${nowDate}.\n\n`+
              `ونود التنبيه إلى أن تكرار التسرب يؤثر سلبًا على مستوى الطالبة التحصيلي، ويؤدي إلى فوات شرح الدروس والأنشطة الصفية المهمة.\n\n`+
              `لذا نرجو منكم متابعة الطالبة والتأكيد على أهمية الالتزام ، حرصًا على مصلحتها التعليمية وانتظامها المدرسي.\n\n`+
              `شاكرين لكم تعاونكم واهتمامكم\n`+
              `إدارة مدرسة جوهرة مسقط للتعليم الأساسي`
            : `السلام عليكم ورحمة الله وبركاته\n\n`+
              `نود إعلامكم أن ابنتكم الطالبة ${name} من الصف ${cls} غائبة اليوم بتاريخ ${nowDate}, ${nowTime}.\n\n`+
              `نرجو منكم ارسال عذر للغياب مع الطالبه.\n`+
              `و نود أيضًا أن ننوه لولي أمر الطالبه أن الغياب المتكرر يؤثر وبشكل كبير جدًا على المستوى التحصيلي للطالبه .\n`+
              `فالحضور هو سر التميز والنجاح والتقدم.\n`+
              `شكراً لتعاونكم \n`+
              `إدارة مدرسة جوهرة مسقط للتعليم الأساسي`;
          const waText=encodeURIComponent(waMessage);
          const contacts=hasPhone
            ? `<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;">
                 <a target="_blank" rel="noopener noreferrer" href="https://wa.me/${phone}?text=${waText}" onclick='markContactAndPaint(this,${JSON.stringify(studentKey)},"whatsapp")' style="background:#e9f9ef;color:#166534;padding:7px 14px;border-radius:999px;text-decoration:none;font-size:13px;font-weight:700;border:1px solid #bbf7d0;">واتساب</a>
                 <a href="tel:+${phone}" onclick='markContactAndPaint(this,${JSON.stringify(studentKey)},"call")' style="background:#ecf3ff;color:#1d4ed8;padding:7px 14px;border-radius:999px;text-decoration:none;font-size:13px;font-weight:700;border:1px solid #bfdbfe;">اتصال</a>
               </div>`
            : `<div style="font-size:12px;color:#64748b;margin-top:8px;background:#f8fafc;border:1px dashed #cbd5e1;border-radius:10px;padding:6px 10px;">لا يوجد رقم ولي أمر</div>`;
          const contactValue=actionTaken||'none';
          return {
            cls,
            name,
            status,
            teacherName,
            studentKey,
            cardHtml:`<div class="student-contact-card" data-contact="${contactValue}" style="background:${cardBg};border:2px solid ${cardBorder};border-radius:14px;padding:12px;margin-bottom:10px;box-shadow:0 2px 8px rgba(15,23,42,.04);">
            <div style="display:flex;justify-content:space-between;gap:8px;align-items:center;">
              <div class="student-contact-name" style="font-weight:800;color:${nameColor};font-size:15px;">${escapeHtml(name)}</div>
              <div style="display:flex;align-items:center;gap:6px;">
                <span class="student-pending-badge" style="display:${contactValue==='none'?'inline-flex':'none'};font-size:11px;color:#9a3412;background:#ffedd5;border:1px solid #fdba74;border-radius:999px;padding:2px 8px;">بانتظار التواصل</span>
                <span class="student-contact-hint" style="font-size:12px;color:${actionHintColor};font-weight:700;">${actionHintText}</span>
              </div>
            </div>
            <div style="font-size:12px;color:#64748b;margin-top:2px;">الصف: ${escapeHtml(cls)} | المعلم: ${escapeHtml(teacherName)}</div>
            <div style="font-size:13px;color:#334155;margin-top:8px;background:${badgeBg};border:1px solid ${cardBorder};border-radius:10px;padding:6px 10px;">الحالة المسجلة: <span style="font-weight:800;color:${badgeColor};">${escapeHtml(status)}</span></div>
            ${contacts}
          </div>`
          };
        });

        const studentsByClassDropout={};
        const studentsByClassAbsence={};
        studentCards.forEach(cardData=>{
          const cls=String(cardData.cls||'').trim()||'بدون صف';
          const targetMap=isDropoutStatus(cardData.status)?studentsByClassDropout:studentsByClassAbsence;
          if(!targetMap[cls]) targetMap[cls]=[];
          targetMap[cls].push({
            name:String(cardData.name||'').trim(),
            cardHtml:cardData.cardHtml,
            studentKey:String(cardData.studentKey||''),
            teacherName:String(cardData.teacherName||'').trim()||'غير محدد'
          });
        });

        const classHeaderThemes=[
          {bg:'linear-gradient(135deg,#eef6ff,#e0ecff)',border:'#93c5fd',accent:'#2563eb',pill:'#dbeafe'},
          {bg:'linear-gradient(135deg,#ecfdf5,#dcfce7)',border:'#86efac',accent:'#15803d',pill:'#dcfce7'},
          {bg:'linear-gradient(135deg,#fff7ed,#ffedd5)',border:'#fdba74',accent:'#c2410c',pill:'#ffedd5'},
          {bg:'linear-gradient(135deg,#faf5ff,#f3e8ff)',border:'#d8b4fe',accent:'#7e22ce',pill:'#f3e8ff'},
          {bg:'linear-gradient(135deg,#f0f9ff,#e0f2fe)',border:'#7dd3fc',accent:'#0369a1',pill:'#e0f2fe'}
        ];

        const renderStudentsByClass=(studentsByClass,themeOffset=0)=>{
          return Object.keys(studentsByClass)
            .sort(compareClasses)
            .map((cls,idx)=>{
              const th=classHeaderThemes[(idx+themeOffset)%classHeaderThemes.length];
              const classItems=studentsByClass[cls];
              const teacherNames=[...new Set(classItems.map(item=>String(item.teacherName||'').trim()).filter(Boolean))];
              const teacherText=teacherNames.length?teacherNames.join('، '):'غير محدد';
              const pendingCount=classItems.filter(item=>!getContactAction(item.studentKey)).length;
              const doneCount=classItems.length-pendingCount;
              const studentsHtml=classItems
                .sort((a,b)=>{
                  const ca=getContactAction(`${cls}__${a.name}`)?1:0;
                  const cb=getContactAction(`${cls}__${b.name}`)?1:0;
                  if(ca!==cb) return ca-cb; // غير المتواصل معهم أولاً
                  return a.name.localeCompare(b.name,'ar');
                })
                .map(item=>item.cardHtml)
                .join('');
              return `<div style="margin-bottom:12px;">
                <div style="background:${th.bg};border:1px solid ${th.border};border-right:6px solid ${th.accent};border-radius:12px;padding:10px 12px;margin-bottom:8px;">
                  <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap;">
                    <div style="font-weight:800;color:#0f172a;font-size:15px;">🏫 الصف: ${escapeHtml(cls)} | 👨‍🏫 المعلم: ${escapeHtml(teacherText)}</div>
                    <div style="display:flex;gap:6px;flex-wrap:wrap;">
                      <span style="font-size:11px;color:#1e293b;background:#ffffff;border:1px solid ${th.border};border-radius:999px;padding:3px 8px;">👥 ${classItems.length}</span>
                      <span style="font-size:11px;color:#9a3412;background:#fff7ed;border:1px solid #fdba74;border-radius:999px;padding:3px 8px;">⏳ ${pendingCount}</span>
                      <span style="font-size:11px;color:#166534;background:#ecfdf5;border:1px solid #86efac;border-radius:999px;padding:3px 8px;">✅ ${doneCount}</span>
                    </div>
                  </div>
                </div>
                ${studentsHtml}
              </div>`;
            }).join('');
        };
        const dropoutStudentSectionsHtml=renderStudentsByClass(studentsByClassDropout,0);
        const absenceStudentSectionsHtml=renderStudentsByClass(studentsByClassAbsence,Object.keys(studentsByClassDropout).length);

        const rangeLabel=fromDate===toDate?`📅 التاريخ: ${fromDate}`:`📅 الفترة: من ${fromDate} إلى ${toDate}`;
        const statsHtml=`
          <div style="margin-bottom:8px;font-size:13px;color:#475569;background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:8px 10px;">${rangeLabel}</div>
          <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:15px;">
            <div style="background:#eef6ff;border:1px solid #bfdbfe;border-radius:12px;padding:12px;text-align:center;"><div style="font-size:22px;font-weight:800;color:#1d4ed8;">${allClasses.length}</div><div style="font-size:12px;color:#334155;">📚 إجمالي الصفوف</div></div>
            <div style="background:#ecfdf5;border:1px solid #86efac;border-radius:12px;padding:12px;text-align:center;"><div style="font-size:22px;font-weight:800;color:#15803d;">${fullAttendance}</div><div style="font-size:12px;color:#334155;">✅ حضور كامل</div></div>
            <div style="background:#fef2f2;border:1px solid #fca5a5;border-radius:12px;padding:12px;text-align:center;"><div style="font-size:22px;font-weight:800;color:#b91c1c;">${fullAbsence}</div><div style="font-size:12px;color:#334155;">🚫 غياب كامل</div></div>
            <div style="background:#fff7ed;border:1px solid #fdba74;border-radius:12px;padding:12px;text-align:center;"><div style="font-size:22px;font-weight:800;color:#c2410c;">${partialAbsence}</div><div style="font-size:12px;color:#334155;">⚠️ غياب جزئي</div></div>
            <div style="background:#faf5ff;border:1px solid #d8b4fe;border-radius:12px;padding:12px;text-align:center;"><div style="font-size:22px;font-weight:800;color:#7e22ce;">${dropoutClasses}</div><div style="font-size:12px;color:#334155;">🚨 صفوف بها تسرب</div></div>
            <div style="background:#f8fafc;border:1px solid #cbd5e1;border-radius:12px;padding:12px;text-align:center;"><div style="font-size:22px;font-weight:800;color:#334155;">${notRecorded}</div><div style="font-size:12px;color:#334155;">📝 غير مسجلة</div></div>
          </div>
        `;

        const renderClassSection=(title,colorBg,colorBorder,items)=>{
          const content=items.length
            ? `<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:8px;">${
                items.map(item=>`<div style="background:#fff;border:1px solid ${colorBorder};border-radius:10px;padding:8px 10px;font-size:13px;color:#334155;">${escapeHtml(item)}</div>`).join('')
              }</div>`
            : `<div style="font-size:13px;color:#64748b;">لا توجد صفوف</div>`;
          return `<div style="background:${colorBg};border:2px solid ${colorBorder};border-right:6px solid ${colorBorder};border-radius:12px;padding:12px;margin-bottom:10px;">
            <div style="font-weight:800;margin-bottom:8px;color:#111827;font-size:14px;">${title} (${items.length})</div>
            ${content}
          </div>`;
        };

        const classesDetailsHtml=`
          <div style="margin-bottom:15px;">
            ${renderClassSection('✅ الصفوف بحضور كامل','#ecfdf5','#86efac',fullAttendanceClasses)}
            ${renderClassSection('🚫 الصفوف بغياب كامل','#fef2f2','#fca5a5',fullAbsenceClasses)}
            ${renderClassSection('⚠️ الصفوف بغياب جزئي','#fff7ed','#fdba74',partialAbsenceClasses)}
            ${renderClassSection('🚨 الصفوف التي بها تسرب','#faf5ff','#d8b4fe',dropoutClassesList)}
            ${renderClassSection('📝 الصفوف التي لم تدخل بياناتها','#f8fafc','#cbd5e1',notRecordedClasses)}
          </div>
        `;

        const listTitle=uniqueStudentRows.length
          ? `<h3 style="margin:0 0 10px 0;font-size:16px;color:#111827;">👩‍🎓 الطالبات المتسربات ثم المتغيبات (${uniqueStudentRows.length})</h3>`
          : `<h3 style="margin:0 0 10px 0;font-size:16px;color:#111827;">🎉 لا توجد طالبات غائبات أو متسربات اليوم</h3>`;

        const studentFilterBar=uniqueStudentRows.length?`
          <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:10px;">
            <button type="button" class="student-filter-btn" data-filter="all" onclick="setStudentFilter('all')" style="min-height:auto;padding:6px 12px;margin:0;background:#dbeafe;color:#1d4ed8;border:1px solid #93c5fd;border-radius:999px;font-size:12px;">الكل</button>
            <button type="button" class="student-filter-btn" data-filter="pending" onclick="setStudentFilter('pending')" style="min-height:auto;padding:6px 12px;margin:0;background:#eef2f7;color:#334155;border:1px solid #dbe3ee;border-radius:999px;font-size:12px;">بانتظار التواصل</button>
            <button type="button" class="student-filter-btn" data-filter="done" onclick="setStudentFilter('done')" style="min-height:auto;padding:6px 12px;margin:0;background:#eef2f7;color:#334155;border:1px solid #dbe3ee;border-radius:999px;font-size:12px;">تم التواصل</button>
            <span id="studentFilterInfo" style="font-size:12px;color:#64748b;margin-right:auto;"></span>
          </div>
        `:'';

        const printStudents=(uniqueStudentRows||[])
          .map(s=>{
            const cls=String(s.class||'').trim();
            const name=String(s.student||'').trim();
            return {
              className:cls,
              name,
              status:String(s.status||'').trim(),
              contact:getContactAction(`${cls}__${name}`)||'none',
              teacherName:getTeacherForRow(s,cls)
            };
          })
          .sort((a,b)=>{
            const da=isDropoutStatus(a.status)?0:1;
            const db=isDropoutStatus(b.status)?0:1;
            if(da!==db) return da-db;
            const c=compareClasses(a.className,b.className);
            if(c!==0) return c;
            return a.name.localeCompare(b.name,'ar');
          });

        latestPrintData={
          teacherName:fallbackTeacherName,
          rangeLabel,
          totals:{
            totalClasses:allClasses.length,
            fullAttendance,
            fullAbsence,
            partialAbsence,
            dropoutClasses,
            notRecorded
          },
          classes:{
            fullAttendanceClasses:[...fullAttendanceClasses],
            fullAbsenceClasses:[...fullAbsenceClasses],
            partialAbsenceClasses:[...partialAbsenceClasses],
            dropoutClassesList:[...dropoutClassesList],
            notRecordedClasses:[...notRecordedClasses]
          },
          students:printStudents
        };

        setProgress(92,'جاري عرض النتائج');
        if(requestId!==absRequestId) return;
        r.innerHTML=statsHtml+classesDetailsHtml+`<div style="background:#f5f8fc;border:1px solid #dbe6f3;border-radius:14px;padding:12px;">${listTitle}${studentFilterBar}<div style="margin-bottom:12px;"><h4 style="margin:0 0 8px 0;color:#6b21a8;font-size:15px;">🚨 المتسربات (${dropoutRows.length})</h4>${dropoutStudentSectionsHtml||'<div style="font-size:13px;color:#64748b;background:#fff;border:1px dashed #d8b4fe;border-radius:10px;padding:8px 10px;">لا توجد طالبات متسربات</div>'}</div><div><h4 style="margin:0 0 8px 0;color:#b45309;font-size:15px;">🚫 المتغيبات (${absenceRows.length})</h4>${absenceStudentSectionsHtml||'<div style="font-size:13px;color:#64748b;background:#fff;border:1px dashed #fdba74;border-radius:10px;padding:8px 10px;">لا توجد طالبات متغيبات</div>'}</div></div>`;
        if(uniqueStudentRows.length){
          setStudentFilter(currentStudentFilter||'all');
        }
        setProgress(100,'اكتمل الجلب');
        setTimeout(hideProgress,260);
      }catch(e){
        if(requestId!==absRequestId) return;
        hideProgress();
        r.innerHTML='<div style="text-align:center;padding:30px;color:#b91c1c;">خطأ في تحميل البيانات</div>';
      }
    }
  </script>
 </body>
</html>
